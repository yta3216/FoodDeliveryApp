  <!-- Incoming orders tab-->

    GET /orders?status=pending&restaurant_id={id}

  -->

    <!-- pending order cards injected here -->
    <!-- each card has: Accept button + Reject button -->
    <!-- empty state: "no incoming orders" -->

  <!-- Active orders tab-->

    GET /orders?status=confirmed&restaurant_id={id}
    PATCH /orders/{order_id}/status
  -->
  <div id="tab-active" class="tab-section">
    <!-- active order cards: order id, items, current status -->
