name: Tests on Push (any branch)

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - "fullstack-project/backend/testing/coverage-reports-html/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r fullstack-project/backend/requirements.txt
        pip install pylint
    - name: run pytest tests with coverage report in terminal
      run: |
        pytest fullstack-project/backend/testing --cov
        
