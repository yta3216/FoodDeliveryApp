services:
  backend:
    build:
      context: ./fullstack-project/backend
    ports:
      - "8000:8000"
    volumes:
      - ./fullstack-project/backend:/app

  server:
    build:
      context: ./fullstack-project/frontend
    environment:
      BACKEND_HOST: backend
      NODE_ENV: development
    ports:
      - "5173:5173"